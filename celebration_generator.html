<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebration Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffb7c5;
            --accent-color: #ff4081;
            --bg-fallback: linear-gradient(135deg, #fff5f7 0%, #f0f4ff 100%);
            
            /* 背景画像パス（お祝いジェネレーター素材フォルダを指定） */
            --bg-sakura-img: url('お祝いジェネレーター素材/桜吹雪背景.png'); 
            --bg-party-img: url('お祝いジェネレーター素材/パーティー背景.png');
            --bg-sunset-img: url('お祝いジェネレーター素材/夕焼け背景.png');
            --bg-cute-img: url('お祝いジェネレーター素材/さわやか背景.png');
            --bg-sunlight-img: url('お祝いジェネレーター素材/木漏れ日背景.png');
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Kiwi Maru', serif;
            background-color: #fff;
            overflow: hidden;
            color: #333;
        }

        /* 共有リンク用画面 */
        #auto-play-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 200;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white; padding: 20px;
        }
        #auto-play-btn {
            font-size: 1.5rem; font-weight: bold; font-family: inherit;
            background: linear-gradient(45deg, #ff7eb3, #ff758c);
            color: white; border: none; padding: 20px 40px; border-radius: 60px;
            box-shadow: 0 6px 25px rgba(255, 126, 179, 0.6); cursor: pointer;
        }

        /* 設定画面 */
        #setup-screen {
            display: flex; flex-direction: column; align-items: center;
            height: 100%; overflow-y: auto; padding: 30px 20px; box-sizing: border-box;
            background: var(--bg-fallback); z-index: 100; position: relative;
        }
        .container { width: 100%; max-width: 400px; background: rgba(255,255,255,0.7); padding: 25px; border-radius: 25px; backdrop-filter: blur(5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { color: var(--accent-color); text-align: center; margin-top: 0; font-size: 1.4rem; }
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        input, select, textarea { padding: 12px; border-radius: 12px; border: 2px solid #ffdae0; font-size: 16px; font-family: inherit; background: white; outline: none; }
        .btn-area { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        button { padding: 15px; font-size: 1.1rem; font-weight: bold; font-family: inherit; border-radius: 40px; border: none; cursor: pointer; transition: 0.3s; }
        #start-btn { background: linear-gradient(45deg, #ff7eb3, #ff758c); color: white; box-shadow: 0 4px 15px rgba(255, 126, 179, 0.4); }
        #share-btn { background: white; color: var(--accent-color); border: 2px solid var(--accent-color); font-size: 0.9rem; }

        /* 演出画面 */
        #celebration-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background-size: cover; background-position: center;
            overflow: hidden;
        }

        /* 背景のアニメーション */
        .bg-sakura { background-image: var(--bg-sakura-img); animation: bg-zoom-slow 20s ease-in-out infinite alternate; }
        .bg-party { background-image: var(--bg-party-img); animation: bg-zoom 10s ease-in-out infinite alternate; }
        .bg-sunset { background-image: var(--bg-sunset-img); animation: bg-zoom-slow 25s linear infinite alternate; }
        .bg-cute { background-image: var(--bg-cute-img); animation: bg-shake-slow 18s ease-in-out infinite; }
        .bg-sunlight { background-image: var(--bg-sunlight-img); animation: bg-shake 14s ease-in-out infinite; }

        @keyframes bg-zoom-slow { 0% { transform: scale(1.05); } 100% { transform: scale(1.15); } }
        @keyframes bg-zoom { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        /* テキスト表示（スマホ対応） */
        #text-container { 
            z-index: 10; padding: 20px; width: 90%; max-width: 600px;
            opacity: 0; /* 最初は非表示 */
        }
        .active-text { animation: celebrateIn 1.5s ease-out forwards; }

        #display-name { 
            font-size: clamp(1.8rem, 8vw, 3rem); 
            color: #ff4081; margin-bottom: 10px; font-weight: bold;
            text-shadow: 3px 3px 0 #fff, -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff;
            animation: text-glow-strong 2s ease-in-out infinite alternate;
        }

        #display-msg { 
            font-size: clamp(2rem, 10vw, 4rem); font-weight: bold; color: #333; line-height: 1.2; 
            overflow-wrap: anywhere; /* ❤などの改行対策 */
            animation: text-glow-white 3s ease-in-out infinite alternate;
        }

        @keyframes text-glow-strong { 0% { transform: scale(1); } 100% { transform: scale(1.03); } }
        @keyframes text-glow-white { 0% { text-shadow: 0 0 10px rgba(255,255,255,0.6); } 100% { text-shadow: 0 0 40px rgba(255,255,255,1); } }
        @keyframes celebrateIn { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

        /* 飾りパーツ */
        .particle { position: absolute; pointer-events: none; z-index: 5; background-size: contain; background-repeat: no-repeat; }
        .anim-rise-straight { animation: rise-straight linear infinite; }
        @keyframes rise-straight {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-25vh); opacity: 0; }
        }
        .anim-fall-diagonal { animation: fall-diagonal linear infinite; }
        @keyframes fall-diagonal {
            0% { transform: translate(-10vw, 0vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(15vw, 105vh) rotate(540deg); opacity: 0; }
        }

        #back-btn { position: absolute; bottom: 80px; background:rgba(255,255,255,0.8); border:1px solid #ddd; padding:12px 30px; border-radius:30px; cursor:pointer; z-index:100; }
    </style>
</head>
<body>

    <div id="auto-play-screen">
        <h2 id="auto-play-title" style="margin-bottom: 30px;">お祝いが届いています</h2>
        <button id="auto-play-btn">お祝いをみる</button>
    </div>

    <div id="setup-screen">
        <div class="container">
            <h2>Celebration Maker</h2>
            <div class="input-group"><label>名前</label><input type="text" id="user-name" placeholder="例：〇〇ちゃん"></div>
            <div class="input-group"><label>メッセージ</label><textarea id="user-text" rows="2">おめでとう❤</textarea></div>
            <div class="input-group">
                <label>背景</label>
                <select id="bg-image-choice">
                    <option value="bg-sakura">🌸 桜吹雪</option>
                    <option value="bg-party">🎉 パーティー</option>
                    <option value="bg-sunset">🌅 夕焼け</option>
                    <option value="bg-cute">🌿 さわやか</option>
                    <option value="bg-sunlight">☀️ 木漏れ日</option>
                </select>
            </div>
            <div class="input-group">
                <label>飾り</label>
                <select id="deco-choice">
                    <option value="sakura">🌸 桜吹雪セット</option>
                    <option value="balloon">🎈 バルーンセット</option>
                    <option value="heart">❤️ ハートセット</option>
                    <option value="kirakira">✨ きらきらパーツ</option>
                    <option value="ribbon">🎀 りぼんパーツ</option>
                </select>
            </div>
            <div class="input-group">
                <label>BGM</label>
                <select id="bgm-choice
