<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asuka Cosmos</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050510; -webkit-text-size-adjust: 100%; }
        canvas { display: block; touch-action: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; 
                    flex-direction: column; justify-content: center; align-items: center; 
                    font-family: serif; z-index: 100; transition: opacity 1s; }
        #startScreen { background: radial-gradient(circle, #1a1a3a 0%, #050510 100%); color: white; }
        h1 { font-size: 2.5rem; margin: 0; letter-spacing: 0.3rem; text-shadow: 0 0 15px #FFD700; text-align: center; }
        .btn { margin-top: 30px; padding: 15px 40px; font-size: 1.1rem; background: transparent; color: white; 
               border: 1px solid white; cursor: pointer; transition: 0.3s; font-family: serif; -webkit-appearance: none; }
        
        /* UI表示 */
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: serif; pointer-events: none; z-index: 10; font-size: 1.4rem; display: none; text-shadow: 0 0 5px #000; }
        
        /* スピーカーアイコンボタン */
        #audioBtnContainer { 
            position: absolute; top: 15px; right: 15px; z-index: 110; 
            width: 44px; height: 44px; background: rgba(0,0,0,0.4); 
            border: 1px solid white; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; touch-action: auto;
        }
        #audioBtnContainer svg { width: 24px; height: 24px; fill: white; }
    </style>
</head>
<body>
    <div id="startScreen" class="overlay">
        <h1>飛鳥コスモス</h1>
        <p style="margin-top: 10px; opacity: 0.8;">— 10000の記憶を辿る旅 —</p>
        <button class="btn" id="startBtn">夜をはじめる</button>
    </div>

    <div id="ui">光の記憶: <span id="scoreVal">0</span></div>
    
    <div id="audioBtnContainer" id="audioToggle">
        <svg id="icon-on" viewBox="0 0 24 24" style="display:none;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg id="icon-off" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
    </div>

    <canvas id="cosmosCanvas"></canvas>

    <script>
        const canvas = document.getElementById('cosmosCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisp = document.getElementById('scoreVal');
        const startScreen = document.getElementById('startScreen');
        const uiLayer = document.getElementById('ui');
        const audioContainer = document.getElementById('audioBtnContainer');
        const iconOn = document.getElementById('icon-on');
        const iconOff = document.getElementById('icon-off');
        const startBtn = document.getElementById('startBtn');

        let width, height, score = 0, slowTime = 0, isPlaying = false;
        let planets = [], comets = [], particles = [];
        
        let audioCtx = null;
        let bgm = new Audio();
        bgm.loop = true;
        let audioEnabled = false;
        const bgmFiles = ['asuka1.mp3', 'asuka2.mp3', 'asuka3.mp3', 'asuka4.mp3', 'asuka5.mp3'];

        function unlockAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleAudio() {
            unlockAudio();
            audioEnabled = !audioEnabled;
            if (audioEnabled) {
                if (!bgm.src) bgm.src = bgmFiles[Math.floor(Math.random() * bgmFiles.length)];
                bgm.play().catch(() => {});
                iconOn.style.display = 'block';
                iconOff.style.display = 'none';
            } else {
                bgm.pause();
                iconOn.style.display = 'none';
                iconOff.style.display = 'block';
            }
        }

        // ソフトな音色（サイン波で柔らかく）
        function playSoftTone(freq, duration = 0.6) {
            if (!audioEnabled || !audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine'; // 柔らかな丸い音
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.05); // ゆっくり立ち上がる
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        startBtn.addEventListener('click', () => {
            unlockAudio();
            startScreen.style.opacity = 0;
            setTimeout(() => {
                startScreen.style.display = 'none';
                uiLayer.style.display = 'block';
                isPlaying = true;
                resize(); animate();
            }, 500);
        });

        // クリックとタッチの両方で反応するように修正
        const toggleHandler = (e) => {
            e.preventDefault(); e.stopPropagation();
            toggleAudio();
        };
        audioContainer.addEventListener('click', toggleHandler);
        audioContainer.addEventListener('touchstart', toggleHandler);

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            planets = [
                { id: 'gold', x: width * 0.5, y: height * 0.55, r: 40, color: '#FFD700', glow: '#FF8C00', cd: 0, maxCd: 0 },
                { id: 'blue', x: width * 0.25, y: height * 0.35, r: 35, color: '#B0E0E6', glow: '#00BFFF', cd: 0, maxCd: 600 },
                { id: 'pink', x: width * 0.75, y: height * 0.35, r: 38, color: '#FFB7C5', glow: '#FF69B4', cd: 0, maxCd: 900 }
            ];
        }

        class Particle {
            constructor(x, y, color, isExplosion = false, isRainbow = false) {
                this.x = x; this.y = y; this.opacity = 1.0;
                this.color = isRainbow ? `hsl(${Math.random() * 360}, 100%, 70%)` : color;
                this.size = Math.random() * (isExplosion ? 6 : 2);
                this.vx = isExplosion ? (Math.random() - 0.5) * 8 : 0;
                this.vy = isExplosion ? (Math.random() - 0.5) * 8 : 0;
            }
            update() { this.x += this.vx; this.y += this.vy; this.opacity -= 0.03; }
            draw() { ctx.save(); ctx.globalAlpha = this.opacity; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.restore(); }
        }

        class Comet {
            constructor(type) { this.type = type; this.init(); }
            init() {
                this.active = true;
                const s = (slowTime > 0) ? 0.2 : 1.0;
                // ★ 流れ星の出現音は「無し」に変更
                if (this.type === 'YAMATO') { this.x = width + 100; this.y = height * 0.45; this.vx = -25 * s; this.vy = 0; this.color = '#FFFFFF'; this.size = 9; this.point = 500; }
                else if (this.type === 'AMATSU') { this.x = width + 50; this.y = Math.random() * height * 0.4; this.vx = -18 * s; this.vy = 8 * s; this.color = '#FFFFFF'; this.size = 6; this.point = 100; }
                else { this.x = Math.random() * width; this.y = -50; this.vx = (Math.random() - 0.5) * 2 * s; this.vy = (this.type === 'CHINU' ? 3.5 : 5) * s; this.color = (this.type === 'CHINU' ? '#87CEFA' : (this.type === 'MENOKO' ? '#FFC0CB' : '#F0F8FF')); this.size = 3; this.point = 10; }
            }
            update() { this.x += this.vx; this.y += this.vy; if (Math.random() > 0.3) particles.push(new Particle(this.x, this.y, this.color, false, this.type==='YAMATO')); if (this.x < -150 || this.x > width + 150 || this.y > height + 150) this.active = false; }
            draw() { ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.restore(); }
        }

        function handleInteraction(ex, ey) {
            if (!isPlaying) return;
            // ボタンエリアのクリックはゲームの処理に入れない
            if (ex > width - 60 && ey < 60) return;

            planets.forEach(p => {
                if (Math.hypot(p.x - ex, p.y - ey) < p.r + 35 && p.cd <= 0) {
                    if (p.id === 'gold') { slowTime = 180; playSoftTone(440); }
                    else if (p.id === 'blue') { const tx = width / 2; const ty = height * 0.3; comets.forEach(c => { c.vx = (tx - c.x) * 0.04; c.vy = (ty - c.y) * 0.04; }); p.cd = p.maxCd; playSoftTone(660); }
                    else if (p.id === 'pink') { let pts = 0; comets.forEach(c => { pts += c.point; c.active = false; for(let i=0;i<4;i++) particles.push(new Particle(c.x,c.y,c.color,true)); }); score += pts; scoreDisp.innerText = score; p.cd = p.maxCd; playSoftTone(880); }
                    for (let i = 0; i < 30; i++) particles.push(new Particle(p.x, p.y, p.color, true));
                }
            });
            comets.forEach(c => {
                const hit = (width < 600) ? 80 : 60;
                if (Math.hypot(c.x - ex, c.y - ey) < hit) {
                    c.active = false; score += c.point; scoreDisp.innerText = score;
                    playSoftTone(1000 + Math.random() * 500, 0.3); // タップ音をソフトなポーン音に
                    for (let i = 0; i < 15; i++) particles.push(new Particle(c.x, c.y, c.color, true, c.type==='YAMATO'));
                }
            });
        }

        window.addEventListener('mousedown', e => handleInteraction(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => { 
            const touch = e.touches[0];
            handleInteraction(touch.clientX, touch.clientY);
            if(isPlaying) e.preventDefault(); 
        }, {passive: false});

        function animate() {
            if (!isPlaying) return;
            const step = Math.min(score / 9000, 1);
            const r = 15 + 205 * step, g = 15 + 145 * step, b = 58 + 122 * step;
            canvas.style.background = `radial-gradient(circle at center, rgb(${r},${g},${b+30}), rgb(${r/4},${g/4},${b/3}))`;
            ctx.clearRect(0, 0, width, height);
            if (slowTime > 0) slowTime--;
            planets.forEach(p => { if (p.cd > 0) p.cd--; const a = p.cd <= 0 ? 1.0 : 0.2; ctx.save(); ctx.shadowBlur = p.cd <= 0 ? 20 : 5; ctx.shadowColor = p.glow; ctx.globalAlpha = a; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); ctx.restore(); });
            if (Math.random() > (score >= 5000 ? 0.99 : 0.998)) comets.push(new Comet(score >= 5000 && Math.random() > 0.85 ? 'YAMATO' : 'AMATSU'));
            if (Math.random() > 0.98) comets.push(new Comet('ASUKA'));
            if (Math.random() > 0.985) comets.push(new Comet('CHINU'));
            comets = comets.filter(c => c.active); comets.forEach(c => { c.update(); c.draw(); });
            particles = particles.filter(p => p.opacity > 0); particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
